<!DOCTYPE html>
<html>
<head>
<title>My AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px
}

#chat{
max-width:500px;
margin:auto;
text-align:left
}

input{
padding:10px;
width:70%
}

button{
padding:10px
}
</style>
</head>

<body>

<h2>My AI Chat</h2>

<div id="chat"></div>

<input id="q" placeholder="Ask something">
<button onclick="ask()">Send</button>

<script>

const API_KEY="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"

async function ask(){

let q=document.getElementById("q").value

document.getElementById("chat").innerHTML+=`<p><b>You:</b> ${q}</p>`
document.getElementById("chat").innerHTML+=`<p id="thinking">AI: Thinking...</p>`

let r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":"https://thesugrdp.vercel.app",
"X-Title":"My AI Chat"
},
body:JSON.stringify({
model:"openchat/openchat-7b",
messages:[{role:"user",content:q}]
})
})

let data=await r.json()

document.getElementById("thinking").innerHTML="<b>AI:</b> "+data.choices[0].message.content

}

</script>

</body>
</html>
