<!DOCTYPE html>
<html>
<head>
<title>Instagram AI Caption Generator</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#222;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input{
width:80%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#ff2d55;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

textarea{
width:90%;
height:200px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>🚀 Instagram Caption Generator</h1>

<div class="box">

<input id="topic" placeholder="Enter topic (fitness, travel...)">

<br>

<button onclick="generate()">Generate Caption</button>

<textarea id="result"></textarea>

</div>

<script>

function generate(){

var topic=document.getElementById("topic").value;

var hooks=[
"🔥 Everyone is talking about "+topic+"...",
"😳 Most people don't know this about "+topic+".",
"🚀 Want to grow fast in "+topic+"?",
"⚠️ Stop ignoring this "+topic+" tip.",
"💡 The secret behind successful "+topic+"."
];

var captions=[
"Consistency is the key to mastering "+topic+". Start small, stay focused, and results will follow.",
"If you really want success in "+topic+", you need discipline and daily action.",
"The biggest mistake people make in "+topic+" is quitting too early."
];

var hashtags=
"#viral #explorepage #reelsviral #instagramgrowth #contentcreator #trend #trendingreels #explore #instareels #viralpost #instagrowth #creatorlife #growthmindset #socialmedia #reelitfeelit";

var hook=hooks[Math.floor(Math.random()*hooks.length)];
var caption=captions[Math.floor(Math.random()*captions.length)];

document.getElementById("result").value=
hook+"\n\n"+caption+"\n\nSave this post 📌\nFollow for more 🚀\n\n"+hashtags;

}

</script>

</body>
</html>
