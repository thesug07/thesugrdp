<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Chat</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}
#chat{width:90%;max-width:500px;margin:auto}
input{width:70%;padding:10px}
button{padding:10px}
#answer{margin-top:20px}
</style>
</head>

<body>

<h2>My AI Chat</h2>

<div id="chat">
<input id="q" placeholder="Ask anything">
<button onclick="ask()">Send</button>
<p id="answer"></p>
</div>

<script>
async function ask(){

let q=document.getElementById("q").value
document.getElementById("answer").innerText="Thinking..."

let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Baerer 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"
},
body:JSON.stringify({
model:"mistralai/mistral-7b-instruct",
messages:[{role:"user",content:q}]
})
})

let data=await res.json()
document.getElementById("answer").innerText=data.choices[0].message.content

}
</script>

</body>
</html>
