<!DOCTYPE html>
<html>
<head>
<title>Creator SEO Tool</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:10px;
max-width:700px;
margin:auto;
}

input{
width:80%;
padding:12px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 25px;
background:#ff2d55;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

textarea{
width:90%;
height:200px;
margin-top:20px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>🚀 Creator SEO Tool</h1>

<div class="box">

<input id="topic" placeholder="Enter topic">

<br>

<button onclick="generate()">Generate Caption</button>

<textarea id="result"></textarea>

</div>

<script>

async function generate(){

let topic=document.getElementById("topic").value;

let response=await fetch("/api/caption",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({topic:topic})
});

let data=await response.json();

document.getElementById("result").value=data.caption;

}

</script>

</body>
</html>
