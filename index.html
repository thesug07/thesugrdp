<script>

const API_KEY="PASTE_YOUR_NEW_OPENROUTER_KEY"

async function ask(){

let q=document.getElementById("q").value

document.getElementById("chat").innerHTML+=`<div><b>You:</b> ${q}</div>`
document.getElementById("chat").innerHTML+=`<div id="thinking">AI: Thinking...</div>`

let r=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":"https://thesugrdp.vercel.app",
"X-Title":"My AI Chat"
},
body:JSON.stringify({
model:"openchat/openchat-7b",
messages:[{role:"user",content:q}]
})
})

let data=await r.json()

document.getElementById("thinking").innerHTML="<b>AI:</b> "+data.choices[0].message.content

}

</script>
