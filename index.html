<!DOCTYPE html>
<html>
<head>
<title>Super Ultra Caption AI</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:750px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:12px;
}

input,select{
width:85%;
padding:12px;
margin:10px;
border:none;
border-radius:6px;
}

button{
padding:12px 25px;
background:#f43f5e;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

textarea{
width:90%;
height:220px;
margin-top:15px;
border-radius:8px;
padding:10px;
}

</style>
</head>

<body>

<h1>🚀 Super Ultra Caption AI Generator</h1>

<div class="container">

<input id="topic" placeholder="Post topic (fitness, travel, business...)">

<select id="platform">
<option>Instagram</option>
<option>TikTok</option>
<option>YouTube Shorts</option>
</select>

<select id="tone">
<option>Viral</option>
<option>Professional</option>
<option>Funny</option>
<option>Motivational</option>
</select>

<button onclick="generate()">Generate AI Caption</button>

<textarea id="result"></textarea>

</div>

<script>

async function generate(){

let topic=document.getElementById("topic").value;
let tone=document.getElementById("tone").value;
let platform=document.getElementById("platform").value;

let prompt=
"Write a viral "+platform+" caption about "+topic+
" with "+tone+
" tone. Include hooks, call to action, and 30 SEO hashtags.";

let response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_API_KEY"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:prompt}],
max_tokens:300
})
});

let data=await response.json();

document.getElementById("result").value=data.choices[0].message.content;

}

</script>

</body>
</html>
