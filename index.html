<!DOCTYPE html>
<html>
<head>
<title>Bangla Auto Caption Generator</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

h1{
color:#0a66ff;
}

textarea{
width:90%;
height:100px;
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
background:#0a66ff;
color:white;
border:none;
font-size:16px;
border-radius:5px;
margin-top:10px;
}

#result{
margin-top:20px;
font-size:20px;
color:#333;
}
</style>
</head>

<body>

<h1>Bangla Auto Caption Generator</h1>

<textarea id="text" placeholder="Type something..."></textarea><br>

<button onclick="generate()">Generate Caption</button>

<div id="result"></div>

<script>

let emojis = ["🔥","❤️","😎","✨","💔","🥀","😌","💯"];

function generate(){

let text = document.getElementById("text").value;

let emoji = emojis[Math.floor(Math.random()*emojis.length)];

let caption = text + " " + emoji + " #bangla #caption";

document.getElementById("result").innerHTML = caption;

}

</script>

</body>
</html>
